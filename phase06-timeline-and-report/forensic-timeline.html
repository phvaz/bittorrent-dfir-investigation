<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forensic Timeline — BTD-2026-001</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#fafaf9;color:#0b0b0b;padding:2rem 1rem}
.wrap{max-width:780px;margin:0 auto}
.page-title{font-size:20px;font-weight:500;color:#0b0b0b;margin-bottom:4px}
.page-sub{font-size:13px;color:#898781;margin-bottom:1.5rem}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-bottom:1.75rem;padding:10px 14px;background:#fff;border:0.5px solid #e1e0d9;border-radius:8px}
.leg{display:flex;align-items:center;gap:6px;font-size:12px;color:#52514e}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tl{position:relative;padding-left:30px}
.tl::before{content:'';position:absolute;left:11px;top:0;bottom:0;width:1.5px;background:#e1e0d9}
.session{margin-bottom:2rem}
.session-label{font-size:11px;font-weight:500;color:#898781;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.75rem;padding-left:4px}
.event{position:relative;margin-bottom:.6rem}
.event-dot{position:absolute;left:-23px;top:12px;width:10px;height:10px;border-radius:50%;border:2px solid #fafaf9;flex-shrink:0}
.card{border:0.5px solid #e1e0d9;border-radius:8px;padding:10px 13px;background:#fff;cursor:pointer;transition:border-color .15s}
.card:hover{border-color:#b4b2a9}
.card.open{border-color:#2a78d6}
.card-top{display:flex;align-items:flex-start;gap:10px;justify-content:space-between}
.card-left{display:flex;align-items:center;gap:9px;flex:1;min-width:0}
.ts{font-size:11px;font-weight:500;color:#898781;white-space:nowrap;flex-shrink:0;font-family:'SF Mono',Monaco,'Cascadia Mono',monospace}
.ev-title{font-size:13px;font-weight:500;color:#0b0b0b;line-height:1.35}
.badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.chevron{font-size:12px;color:#898781;flex-shrink:0;transition:transform .2s;margin-left:4px}
.card.open .chevron{transform:rotate(180deg)}
.detail{font-size:12.5px;color:#52514e;line-height:1.65;margin-top:8px;padding-top:8px;border-top:0.5px solid #e1e0d9;display:none}
.card.open .detail{display:block}
.sources{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.src-chip{background:#f1efe8;border:0.5px solid #d3d1c7;border-radius:4px;padding:2px 7px;font-family:'SF Mono',Monaco,'Cascadia Mono',monospace;font-size:10.5px;color:#52514e}
.footer{margin-top:3rem;padding-top:1rem;border-top:0.5px solid #e1e0d9;font-size:11px;color:#898781}
@media(prefers-color-scheme:dark){
  body{background:#111110;color:#fff}
  .legend,.card{background:#1a1a19;border-color:#2c2c2a}
  .card:hover{border-color:#444441}
  .card.open{border-color:#3987e5}
  .tl::before{background:#2c2c2a}
  .event-dot{border-color:#111110}
  .page-title{color:#fff}
  .ev-title{color:#fff}
  .page-sub,.leg,.ts,.chevron{color:#898781}
  .detail{color:#c3c2b7;border-top-color:#2c2c2a}
  .src-chip{background:#2c2c2a;border-color:#444441;color:#c3c2b7}
  .footer{color:#898781;border-top-color:#2c2c2a}
  .session-label{color:#898781}
}
</style>
</head>
<body>
<div class="wrap">
  <p class="page-title">Forensic timeline — BTD-2026-001</p>
  <p class="page-sub">BitTorrent DFIR Investigation · Click any event to expand evidence details</p>

  <div class="legend">
    <span class="leg"><span class="dot" style="background:#2a78d6"></span>Disk artifact</span>
    <span class="leg"><span class="dot" style="background:#1baf7a"></span>Network evidence</span>
    <span class="leg"><span class="dot" style="background:#eda100"></span>Application log</span>
    <span class="leg"><span class="dot" style="background:#898781"></span>Registry / filesystem</span>
  </div>

  <div class="tl" id="tl"></div>

  <div class="footer">Case BTD-2026-001 · Examiner: Paulo Vaz · Evidence image MD5: 8e01029edeadbfffb36fe8516afb54df</div>
</div>

<script>
const DISK='#2a78d6', NET='#1baf7a', LOG='#eda100', FS='#898781';
const events = [
  {session:'Session 1 — 2026-06-19 (installation)',ts:'10:27',color:DISK,cat:'Disk',title:'Wireshark 4.6.6 downloaded',detail:'Wireshark installer downloaded from wireshark.org via Microsoft Edge. Recorded in browser Web Downloads artifact with domain wireshark.org and timestamp 2026-06-19 10:27 BRT.',sources:['Web Downloads (Edge)']},
  {ts:'10:29',color:DISK,cat:'Disk',title:'qBittorrent 5.2.2 downloaded',detail:'qBittorrent installer downloaded from sourceforge.net via Microsoft Edge. Three CDN mirror entries represent a single download event via CDN redirect.',sources:['Web Downloads (Edge)']},
  {ts:'10:33:04',color:LOG,cat:'Log',title:'qBittorrent installed and first launched — PID 3716',detail:'First execution confirmed by Prefetch file QBITTORRENT.EXE-17EBDC32.pf (run count 3, path /PROGRAM FILES/QBITTORRENT) and application log. Port TCP/UDP 29823 bound. DHT, PeX, and encryption enabled.',sources:['Prefetch (Autopsy)','qbittorrent.log']},
  {ts:'10:33:17',color:LOG,cat:'Log',title:'External IP detected: 187.106.172.158',detail:'qBittorrent detected external IPv4 187.106.172.158 and bound to local IPs 10.0.2.15, 192.168.56.101, and 127.0.0.1. No torrent activity in this session.',sources:['qbittorrent.log']},
  {ts:'10:33:18',color:LOG,cat:'Log',title:'Session 1 ended — no torrent activity',detail:'Session shutdown completed. No torrent was added or downloaded. Consistent with a user testing the application immediately after installation.',sources:['qbittorrent.log']},
  {session:'Session 2 — 2026-06-22 (download)',ts:'12:27',color:NET,cat:'Network',title:'Wireshark capture started',detail:'Network capture initiated. File: qbitorrent-debian.pcapng. Total packets: 585,916 (~22.2% drop rate reported).',sources:['qbitorrent-debian.pcapng']},
  {ts:'12:28:15',color:LOG,cat:'Log',title:'qBittorrent launched — PID 8060, port 29823',detail:'qBittorrent v5.2.2 second session started (PID 8060). Port TCP/UDP 29823 bound. DHT, PeX, and encryption enabled.',sources:['qbittorrent.log']},
  {ts:'12:29:33',color:LOG,cat:'Log',title:'Torrent added: debian-13.5.0-amd64-netinst.iso',detail:'New torrent added. File: debian-13.5.0-amd64-netinst.iso (755 MiB). Info-hash: 58846860f0a766f8a42b0bb214d8c713fdf1b167. Timestamp corroborated by three independent sources.',sources:['qbittorrent.log','NTFS $STANDARD_INFORMATION','Web Downloads (Edge)']},
  {ts:'12:29:33',color:FS,cat:'Filesystem',title:'.torrent file created in BT_backup — inode 156645',detail:'.torrent file written to BT_backup/. NTFS $SI = $FN = 12:29:33 BRT — no timestomping detected. Allocated: 98,304 bytes. Actual: 60,608 bytes.',sources:['TSK istat (inode 156645)']},
  {ts:'12:29:33',color:NET,cat:'Network',title:'HTTP GET /announce → tracker 130.239.18.158:6969',detail:'Tracker announce sent. Parameters: info_hash=58846860..., peer_id=-qB5220- (qBittorrent 5.2.2), port=29823, left=791674880 (755 MiB), event=started.',sources:['pcap frame 14610']},
  {ts:'12:29:33',color:NET,cat:'Network',title:'Tracker 200 OK — 100 peers returned',detail:'Tracker responded HTTP/1.1 200 OK. Server: mimosa. Compact peer encoding: 600 bytes ÷ 6 bytes/peer = 100 peers. Tracker communication fully successful.',sources:['pcap frame 14680']},
  {ts:'12:29:33',color:NET,cat:'Network',title:'DHT Get_peers queries begin for target info-hash',detail:'20,628 BT-DHT packets within the download window, all carrying info-hash 58846860f0a766f8a42b0bb214d8c713fdf1b167 — identical to the .torrent filename on disk.',sources:['pcap frames 14474+']},
  {ts:'12:29:35',color:LOG,cat:'Log',title:'Web seed error: cdimage.debian.org 404',detail:'HTTP web seed URL returned 404 Not Found. This is a web seed (HTTP fallback declared in torrent metadata), NOT the tracker. Tracker had already returned 200 OK. Download continued via P2P connections.',sources:['qbittorrent.log']},
  {ts:'12:29:35+',color:NET,cat:'Network',title:'BitTorrent handshakes — info-hash in TCP payload',detail:'64 TCP connections established. First handshake at frame 16107. Info-hash 58846860f0a766f8a42b0bb214d8c713fdf1b167 visible at hex offsets 0x50–0x60 in the TCP payload, transmitted in clear text.',sources:['pcap frame 16107+','TCP Conversations','peers.csv']},
  {ts:'12:29:35+',color:NET,cat:'Network',title:'Piece exchange: Request / Piece / Have cycle',detail:'Full BitTorrent protocol exchange observed. 276,744 BitTorrent packets within 37 seconds. I/O graph peak: ~35,000 packets/second. Largest contributor: 152.173.104.78 (~321 MB of 64 peers).',sources:['pcap — BitTorrent protocol','I/O graph']},
  {ts:'12:30:10',color:LOG,cat:'Log',title:'Download complete — 755 MiB in 37 seconds',detail:'qBittorrent logged download completion. Duration: 37 seconds for 755 MiB across 64 simultaneous peer connections.',sources:['qbittorrent.log']},
  {ts:'12:32',color:NET,cat:'Network',title:'Wireshark capture stopped',detail:'Network capture ended. Total: 585,916 packets across ~5-minute window covering the full download session.',sources:['qbitorrent-debian.pcapng']}
];

const catColors={
  'Disk':{bg:'#dceaf8',color:'#0c447c'},
  'Network':{bg:'#d2efe4',color:'#085041'},
  'Log':{bg:'#faeeda',color:'#633806'},
  'Filesystem':{bg:'#e8e7e0',color:'#444441'}
};

const tl=document.getElementById('tl');
let currentSession=null;

events.forEach((ev,i)=>{
  if(ev.session){
    if(currentSession)tl.appendChild(currentSession);
    currentSession=document.createElement('div');
    currentSession.className='session';
    const lbl=document.createElement('div');
    lbl.className='session-label';
    lbl.textContent=ev.session;
    currentSession.appendChild(lbl);
  }
  const wrap=document.createElement('div');
  wrap.className='event';
  const dot=document.createElement('div');
  dot.className='event-dot';
  dot.style.background=ev.color;
  wrap.appendChild(dot);
  const card=document.createElement('div');
  card.className='card';
  const top=document.createElement('div');
  top.className='card-top';
  const left=document.createElement('div');
  left.className='card-left';
  const ts=document.createElement('span');
  ts.className='ts';
  ts.textContent=ev.ts;
  left.appendChild(ts);
  const title=document.createElement('span');
  title.className='ev-title';
  title.textContent=ev.title;
  left.appendChild(title);
  top.appendChild(left);
  const right=document.createElement('div');
  right.style.cssText='display:flex;align-items:center;gap:6px;flex-shrink:0';
  const badge=document.createElement('span');
  badge.className='badge';
  const cc=catColors[ev.cat]||{bg:'#e8e7e0',color:'#444441'};
  badge.style.background=cc.bg;
  badge.style.color=cc.color;
  badge.textContent=ev.cat;
  right.appendChild(badge);
  const chev=document.createElement('span');
  chev.className='chevron';
  chev.textContent='▾';
  right.appendChild(chev);
  top.appendChild(right);
  card.appendChild(top);
  const detail=document.createElement('div');
  detail.className='detail';
  detail.textContent=ev.detail;
  const srcs=document.createElement('div');
  srcs.className='sources';
  ev.sources.forEach(s=>{
    const chip=document.createElement('span');
    chip.className='src-chip';
    chip.textContent=s;
    srcs.appendChild(chip);
  });
  detail.appendChild(srcs);
  card.appendChild(detail);
  card.addEventListener('click',()=>card.classList.toggle('open'));
  wrap.appendChild(card);
  if(!currentSession){currentSession=document.createElement('div');currentSession.className='session';}
  currentSession.appendChild(wrap);
});
if(currentSession)tl.appendChild(currentSession);
</script>
</body>
</html>
